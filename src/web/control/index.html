<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Broadcast Control</title>
  <link rel="stylesheet" href="/control/control.css" />
</head>
<body>
  <header>
    <h1>Broadcast Info Display — Controle</h1>
    <span id="connection-status" class="status-disconnected">Desconectado</span>
  </header>
  <main>
    <div class="toolbar">
      <button id="btn-add">+ Adicionar linha</button>
    </div>
    <table id="control-table">
      <thead>
        <tr>
          <th>Frame</th>
          <th>Fonte</th>
          <th>Descrição</th>
          <th>Observação</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </main>
  <script src="/control/control.js" type="module"></script>
</body>
</html>
