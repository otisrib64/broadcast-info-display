<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />
  <meta http-equiv="content-language" content="pt-BR" />
  <title>Broadcast Info Display</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo-mark">BI</div>
      <div class="header-brand">
        <h1>Broadcast Info Display</h1>
        <p class="subtitle">Raspberry Pi HDMI source · controle local em tempo real</p>
      </div>
    </div>
    <div class="header-right">
      <button id="btn-add" class="btn-primary">+ Linha</button>
      <button id="btn-img-toggle" class="btn-outline">🖼 Imagem</button>
      <button id="btn-memo-toggle" class="btn-outline">📝 Notas</button>
      <span id="clock"></span>
      <span id="conn-indicator" class="conn-badge offline">● OFFLINE</span>
    </div>
  </header>

  <div id="img-panel" class="img-panel hidden">
    <label class="img-row">
      <span>Arquivo</span>
      <input type="file" id="img-file" accept="image/*" />
    </label>
    <label class="img-row">
      <span>Largura <b id="img-width-val">200</b>px</span>
      <input type="range" id="img-width" min="20" max="1200" value="200" />
    </label>
    <label class="img-row">
      <span>X <b id="img-x-val">50</b>px</span>
      <input type="range" id="img-x" min="0" max="1800" value="50" />
    </label>
    <label class="img-row">
      <span>Y <b id="img-y-val">50</b>px</span>
      <input type="range" id="img-y" min="0" max="1000" value="50" />
    </label>
    <label class="img-row">
      <span>Visível</span>
      <input type="checkbox" id="img-visible" checked />
    </label>
    <button id="btn-img-remove" class="btn-danger">Remover imagem</button>
  </div>

  <div id="memo-panel" class="memo-panel hidden">
    <textarea id="memo-text" placeholder="Anotações livres — visível para todos na rede em tempo real..."></textarea>
  </div>

  <section class="table-section">
    <div class="section-bar">
      <span class="section-label">TABELA DE OPERAÇÃO</span>
      <span class="section-hint">Campos com lista rápida + digitação manual</span>
    </div>
    <table>
      <thead>
        <tr>
          <th class="col-frame">Frame</th>
          <th class="col-model">Modelo</th>
          <th class="col-source">Fonte</th>
          <th class="col-desc">Descrição</th>
          <th class="col-note">Observação</th>
          <th class="col-status">Status</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </section>

  <footer>
    <div class="legend">
      <span class="legend-item ok"><span class="ldot"></span>OK</span>
      <span class="legend-item standby"><span class="ldot"></span>STANDBY</span>
      <span class="legend-item atencao"><span class="ldot"></span>ATENÇÃO</span>
      <span class="legend-item off"><span class="ldot"></span>OFF</span>
    </div>
    <span class="footer-note">Design pensado para contraste alto em HDMI e uso em matriz de vídeo</span>
  </footer>

  <!-- Datalists -->
  <datalist id="dl-frame">
    <option value="Frame 1"><option value="Frame 2"><option value="Frame 3"><option value="Frame 4">
    <option value="Frame 5"><option value="Frame 6"><option value="Frame 7"><option value="Frame 8">
    <option value="Frame 9"><option value="Frame 10"><option value="Frame 11"><option value="Frame 12">
    <option value="Frame 13"><option value="Frame 14"><option value="Frame 15"><option value="Frame 16">
    <option value="Frame 17"><option value="Frame 18"><option value="Frame 19"><option value="Frame 20">
  </datalist>
  <datalist id="dl-model">
    <option value="Teranex"><option value="FS1"><option value="FS2"><option value="FS4">
  </datalist>
  <datalist id="dl-source">
    <option value="Game 1"><option value="Game 2">
    <option value="Micro 1"><option value="Micro 2">
    <option value="Drone"><option value="Mini Drone">
  </datalist>
  <datalist id="dl-note">
    <option value="FRAME DE ENTRADA">
    <option value="FRAME DE SAÍDA">
  </datalist>

  <img id="overlay-img" class="overlay-img hidden" alt="overlay" draggable="false" />
  <script src="/app.js" type="module"></script>
</body>
</html>
